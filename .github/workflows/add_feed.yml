name: Supplementhub ADD-feed Updater

# Volledige productinfo (alle afbeeldingen + optienamen) om NIEUWE producten met
# Stock Sync aan te maken. 1x per week — nieuwe producten verschijnen niet vaak.

on:
  schedule:
    - cron: "0 4 * * 1"   # maandag 04:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependencies installeren
        run: pip install requests
      - name: ADD-feed scraper draaien
        run: python add_scraper.py
      - name: XML committen en pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supplementhub_add_feed.xml
          git diff --staged --quiet || git commit -m "🆕 ADD-feed bijgewerkt: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
